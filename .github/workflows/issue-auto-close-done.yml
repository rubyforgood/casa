name: 'Close issue when Done'

on:
  project_card:
    types: [moved]

jobs:
  set-state:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/issue-states@a1bd84606ef48dca24ce24140e068516a74b3e0b # v3
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          open-issue-columns: ''
          closed-issue-columns: 'Done'
